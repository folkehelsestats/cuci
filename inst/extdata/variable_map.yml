
# Each variable has:
#   colnames : exact matches (after clean_names normalization)
#   keywords : partial word patterns used for intelligent prediction, at least 3 words
#   type     : target R type
#   label    : variable description
#   value    : optional value labels for categorical variable
#   recode   : optional value remapping
#   missing  : values for missing (not evaluated yet)


kjonn:
  colnames: [Kjonn]
  keywords: [kjonn, sex, gender]
  type: integer
  label: "IOs kjønn"
  value:
    1: "Mann"
    2: "Kvinne"
  recode:
    "0": 2
    "1": 1
    "2": 2
  missing:
    - NA

